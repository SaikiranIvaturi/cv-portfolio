<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Okta Authorization Code Flow with Backend Proxy</title>
<desc>Architecture diagram showing how a browser, backend proxy, and Okta exchange authorization codes and tokens, with tokens kept server-side in a session store.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<mask id="imagine-text-gaps-ofeczt" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="620" fill="white"/><rect x="93.1953125" y="51" width="64.85394287109375" height="22" fill="black" rx="2"/><rect x="61.890625" y="70.5" width="127.04383850097656" height="19" fill="black" rx="2"/><rect x="286.3359375" y="51" width="108.18890380859375" height="22" fill="black" rx="2"/><rect x="274.7265625" y="70.5" width="131.59576416015625" height="19" fill="black" rx="2"/><rect x="533.3515625" y="51" width="43.52899169921875" height="22" fill="black" rx="2"/><rect x="491.9453125" y="70.5" width="126.26983642578125" height="19" fill="black" rx="2"/><rect x="193.0390625" y="112" width="77.74386596679688" height="19" fill="black" rx="2"/><rect x="186.2734375" y="154" width="91.421875" height="19" fill="black" rx="2"/><rect x="249.6953125" y="196" width="180.65573120117188" height="19" fill="black" rx="2"/><rect x="489.671875" y="238" width="130.4918212890625" height="19" fill="black" rx="2"/><rect x="261.265625" y="268" width="157.519775390625" height="19" fill="black" rx="2"/><rect x="156.5234375" y="310" width="151.14779663085938" height="19" fill="black" rx="2"/><rect x="368.7421875" y="352" width="156.48583984375" height="19" fill="black" rx="2"/><rect x="355.21875" y="394" width="183.39971923828125" height="19" fill="black" rx="2"/><rect x="142.2109375" y="436" width="179.62368774414062" height="19" fill="black" rx="2"/><rect x="164.078125" y="478" width="135.8897705078125" height="19" fill="black" rx="2"/><rect x="360.0234375" y="520" width="173.77978515625" height="19" fill="black" rx="2"/><rect x="15" y="-10" width="406.453369140625" height="19" fill="black" rx="2"/></mask></defs>

<!-- Three actor columns -->
<rect x="40" y="40" width="170" height="56" rx="8" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
<text x="125" y="62" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Browser</text>
<text x="125" y="80" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">React SPA, no tokens</text>

<rect x="255" y="40" width="170" height="56" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="340" y="62" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Backend proxy</text>
<text x="340" y="80" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Node.js, session store</text>

<rect x="470" y="40" width="170" height="56" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="555" y="62" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Okta</text>
<text x="555" y="80" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Authorization server</text>

<!-- Vertical lifelines -->
<line x1="125" y1="100" x2="125" y2="560" stroke="rgba(222,220,209,0.15)" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="340" y1="100" x2="340" y2="560" stroke="rgba(222,220,209,0.15)" stroke-width="0.5" stroke-dasharray="3 3" mask="url(#imagine-text-gaps-ofeczt)"/>
<line x1="555" y1="100" x2="555" y2="560" stroke="rgba(222,220,209,0.15)" stroke-width="0.5" stroke-dasharray="3 3" mask="url(#imagine-text-gaps-ofeczt)"/>

<!-- Step 1 -->
<text x="232" y="126" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">1. Click login</text>
<line x1="130" y1="138" x2="335" y2="138" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Step 2 -->
<text x="232" y="168" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">2. 302 redirect</text>
<line x1="335" y1="180" x2="130" y2="180" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Step 3 -->
<text x="340" y="210" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">3. /authorize + PKCE challenge</text>
<line x1="130" y1="222" x2="550" y2="222" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Step 4 -->
<text x="555" y="252" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">4. User authenticates</text>

<!-- Step 5 -->
<text x="340" y="282" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">5. Redirect with auth code</text>
<line x1="550" y1="294" x2="130" y2="294" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Step 6 -->
<text x="232" y="324" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">6. POST code to /callback</text>
<line x1="130" y1="336" x2="335" y2="336" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Step 7 -->
<text x="447" y="366" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">7. Exchange code + secret</text>
<line x1="345" y1="378" x2="550" y2="378" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Step 8 -->
<text x="447" y="408" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">8. Access + ID + refresh tokens</text>
<line x1="550" y1="420" x2="345" y2="420" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Step 9 -->
<text x="232" y="450" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">9. Set httpOnly session cookie</text>
<line x1="335" y1="462" x2="130" y2="462" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Step 10 -->
<text x="232" y="492" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">10. API call with cookie</text>
<line x1="130" y1="504" x2="335" y2="504" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Step 11 -->
<text x="447" y="534" text-anchor="middle" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">11. Forward with bearer token</text>
<line x1="345" y1="546" x2="550" y2="546" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>

<!-- Legend -->
<g transform="translate(40, 580)">
<circle cx="8" cy="0" r="4" fill="#534AB7"/>
<text x="20" y="4" fill="#C2C0B6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Tokens never leave the backend — browser only holds a session cookie</text>
</g>
</svg>
